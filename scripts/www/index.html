<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体重记录</title>
    <!-- 换用更稳定的 Chart.js CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; transition: background 0.3s; }
        .record-card { transition: all 0.2s; }
        .record-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        #weightChart { max-height: 400px; width: 100%; } /* 确保图表容器宽高正常 */
        .dark-mode { background: #121212; color: #eee; }
        .dark-mode .bg-white { background: #1e1e1e; }
        .dark-mode .bg-gray-50 { background: #1a1a1a; }
        .dark-mode .text-gray-800 { color: #eee; }
        .dark-mode .text-gray-500, .dark-mode .text-gray-600 { color: #aaa; }
        .dark-mode .border-b, .dark-mode .divide-y { border-color: #333; }
        .dark-mode input, .dark-mode button { background: #2a2a2a; color: #fff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="max-w-2xl mx-auto p-6">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-4xl font-bold text-indigo-600">体重记录</h1>
            <p class="text-gray-500 mt-1">每天记录，轻松掌握趋势</p>
        </div>
        <div class="flex gap-2 items-center flex-col text-right">
            <button id="toggleDark" class="px-3 py-2 rounded-xl bg-gray-200 text-sm">🌙 深色</button>
            <div id="currentDate" class="text-sm text-gray-500 mt-1"></div>
            <div id="currentTime" class="text-xl font-semibold text-indigo-600"></div>
            <div id="lastWeight" class="text-lg text-gray-500 mt-1">无记录</div>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 mb-8">
        <form id="weightForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">记录日期</label>
                <input type="date" id="date" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">体重（公斤）</label>
                <div class="relative">
                    <input type="number" id="weight" step="0.1" min="0" placeholder="65.5" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500 text-2xl font-semibold" required>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">公斤</span>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">备注（可选）</label>
                <input type="text" id="note" placeholder="今天吃得有点多" 
                       class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500">
            </div>

            <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">身高（厘米）</label>
                    <input type="number" id="height" step="1" min="0" placeholder="170" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">目标体重（公斤）</label>
                    <input type="number" id="targetWeight" step="0.1" min="0" placeholder="60.0" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500">
                </div>
            </div>
            
            <div class="md:col-span-3 flex gap-3 flex-wrap">
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl text-lg transition-all active:scale-95">
                    ✅ 记录体重
                </button>
                <button type="button" onclick="exportExcel()" class="px-4 bg-emerald-100 text-emerald-600 font-medium rounded-2xl">📊 导出表格</button>
                <button type="button" onclick="showWeekReport()" class="px-4 bg-amber-100 text-amber-600 font-medium rounded-2xl">📋 本周报告</button>
                <button type="button" onclick="clearAllData()" class="px-4 bg-red-100 text-red-600 font-medium rounded-2xl">🗑 清空数据</button>
            </div>
        </form>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-3xl p-6 text-center shadow">
            <div class="text-4xl font-bold text-emerald-600" id="totalDays">0</div>
            <div class="text-xs text-gray-500 mt-1">记录天数</div>
        </div>
        <div class="bg-white rounded-3xl p-6 text-center shadow">
            <div class="text-4xl font-bold text-amber-600" id="avgWeight">0.0</div>
            <div class="text-xs text-gray-500 mt-1">平均体重</div>
        </div>
        <div class="bg-white rounded-3xl p-6 text-center shadow">
            <div class="text-4xl font-bold text-purple-600" id="trend">—</div>
            <div class="text-xs text-gray-500 mt-1">最近变化</div>
        </div>
        <div class="bg-white rounded-3xl p-6 text-center shadow">
            <div class="text-4xl font-bold text-blue-600" id="bmiValue">—</div>
            <div class="text-xs text-gray-500 mt-1">当前BMI</div>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h3 class="font-semibold text-lg">🎯 目标进度</h3>
                <p class="text-sm text-gray-500 mt-1">距离目标还差 <span id="remainWeight" class="font-bold">0</span> 公斤</p>
            </div>
            <div>
                <button onclick="setDailyReminder()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-600 px-4 py-2 rounded-xl text-sm">
                    ⏰ 每日提醒
                </button>
            </div>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3 mt-4">
            <div id="progressBar" class="bg-indigo-600 h-3 rounded-full" style="width: 0%"></div>
        </div>
    </div>

    <!-- 图表容器：确保容器存在且样式正常 -->
    <div class="bg-white rounded-3xl shadow-xl p-8 mb-8">
        <h2 class="font-semibold mb-4">📈 体重趋势</h2>
        <div style="width: 100%; height: 400px;">
            <canvas id="weightChart"></canvas>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="px-8 py-6 border-b flex items-center justify-between bg-gray-50">
            <h2 class="font-semibold text-lg">历史记录</h2>
            <span id="recordCount" class="text-xs bg-gray-200 px-3 py-1 rounded-full font-mono">0 条</span>
        </div>
        <div id="recordsList" class="divide-y max-h-[420px] overflow-auto"></div>
    </div>
</div>

<script>
let weightChart = null;
const STORAGE_KEY = "weightRecords";
const TARGET_KEY = "weightTarget";
const HEIGHT_KEY = "userHeight";
const DARK_KEY = "darkMode";

// 精确到秒的实时时间
function updateTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
    document.getElementById('currentDate').textContent = now.toLocaleDateString();
}
setInterval(updateTime, 1000);

function getToday() {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,0)}-${String(t.getDate()).padStart(2,0)}`;
}

// 数据存储相关
function loadRecords() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }
function loadHeight() { return parseFloat(localStorage.getItem(HEIGHT_KEY)) || 0; }
function saveHeight(h) { localStorage.setItem(HEIGHT_KEY, h); }
function loadTarget() { return parseFloat(localStorage.getItem(TARGET_KEY)) || 0; }
function saveTarget(t) { localStorage.setItem(TARGET_KEY, t); }
function isDark() { return localStorage.getItem(DARK_KEY) === 'true'; }
function setDark(d) {
    localStorage.setItem(DARK_KEY, d);
    d ? document.body.classList.add('dark-mode') : document.body.classList.remove('dark-mode');
}

function calcBMI(w, hcm) {
    if (!hcm || !w) return null;
    const h = hcm / 100;
    return (w / (h * h)).toFixed(1);
}

function setDailyReminder() {
    if (!("Notification" in window)) return alert("浏览器不支持通知");
    Notification.requestPermission(p => { if (p === "granted") alert("已开启通知权限！"); });
}

function addRecord() {
    const date = document.getElementById('date').value;
    const w = parseFloat(document.getElementById('weight').value);
    const note = document.getElementById('note').value.trim();
    const h = parseFloat(document.getElementById('height').value) || 0;
    const tg = parseFloat(document.getElementById('targetWeight').value) || 0;
    
    if (!date || isNaN(w)) return;
    if (h > 0) saveHeight(h);
    if (tg > 0) saveTarget(tg);

    let rs = loadRecords();
    const ex = rs.find(x => x.date === date);
    if (ex) { ex.weight = w; ex.note = note; }
    else { rs.push({ date, weight: w, note }); }
    rs.sort((a, b) => new Date(a.date) - new Date(b.date));
    saveRecords(rs);
    renderAll(); // 新增记录后重新渲染图表
    document.getElementById('weightForm').reset();
    document.getElementById('date').value = getToday();
}

function deleteRecord(date) {
    let rs = loadRecords().filter(x => x.date !== date);
    saveRecords(rs);
    renderAll(); // 删除后重新渲染图表
}

function clearAllData() {
    if (!confirm('确定清空所有数据？')) return;
    localStorage.clear();
    renderAll();
}

function renderTarget() {
    const rs = loadRecords();
    const tg = loadTarget();
    if (rs.length === 0 || tg <= 0) {
        document.getElementById('remainWeight').textContent = '0.0';
        document.getElementById('progressBar').style.width = '0%';
        return;
    }
    const last = rs[rs.length - 1].weight;
    const remain = Math.abs(last - tg).toFixed(1);
    document.getElementById('remainWeight').textContent = remain;
    let per = last > tg ? Math.min(100, Math.max(0, ((last - tg) / 10) * 100)) : 100;
    document.getElementById('progressBar').style.width = (100 - per) + '%';
}

function renderStats() {
    const rs = loadRecords();
    const h = loadHeight();
    document.getElementById('recordCount').textContent = rs.length + ' 条';
    document.getElementById('totalDays').textContent = rs.length;

    if (rs.length === 0) {
        document.getElementById('avgWeight').textContent = '0.0';
        document.getElementById('trend').textContent = '—';
        document.getElementById('lastWeight').textContent = '无记录';
        document.getElementById('bmiValue').textContent = '—';
        return;
    }

    const sum = rs.reduce((s, x) => s + x.weight, 0);
    const avg = sum / rs.length;
    document.getElementById('avgWeight').textContent = avg.toFixed(1);
    const last = rs[rs.length - 1].weight;
    const prev = rs.length > 1 ? rs[rs.length - 2].weight : last;
    const diff = last - prev;
    document.getElementById('trend').textContent = diff > 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1);
    document.getElementById('lastWeight').textContent = `最新：${last.toFixed(1)} 公斤`;
    const bmi = calcBMI(last, h);
    document.getElementById('bmiValue').textContent = bmi || '—';
}

function renderList() {
    const l = document.getElementById('recordsList');
    l.innerHTML = '';
    loadRecords().forEach(r => {
        const d = document.createElement('div');
        d.className = 'record-card px-8 py-4 hover:bg-gray-50';
        d.innerHTML = `
        <div class="flex justify-between items-center">
            <div><div class="font-medium">${r.date}</div><div class="text-sm text-gray-500">${r.note || '无备注'}</div></div>
            <div class="flex items-center gap-4">
                <div class="text-xl font-semibold">${r.weight.toFixed(1)} 公斤</div>
                <button onclick="deleteRecord('${r.date}')" class="text-red-400 hover:text-red-600 text-sm">删除</button>
            </div>
        </div>`;
        l.appendChild(d);
    });
}

// 修复图表渲染逻辑：确保Chart加载完成后再初始化
function renderChart() {
    const ctx = document.getElementById('weightChart').getContext('2d');
    const rs = loadRecords();
    
    // 无数据时显示空图表（避免报错）
    if (rs.length === 0) {
        if (weightChart) weightChart.destroy();
        weightChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '体重（公斤）',
                    data: [],
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99,102,241,0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false, min: 40 } // 设置合理的y轴范围
                }
            }
        });
        return;
    }

    const labels = rs.map(x => x.date);
    const values = rs.map(x => x.weight);
    
    // 销毁旧图表，避免重复渲染
    if (weightChart) weightChart.destroy();
    
    // 初始化新图表
    weightChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '体重（公斤）',
                data: values,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99,102,241,0.1)',
                tension: 0.3,
                fill: true,
                pointRadius: 4, // 增加数据点大小，更易查看
                pointBackgroundColor: '#6366f1'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, // 不保持固定比例，适配容器
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    ticks: {
                        maxRotation: 45,
                        minRotation: 45
                    }
                },
                y: {
                    beginAtZero: false,
                    // 自动适配y轴范围（比最小体重小2，比最大体重大2）
                    min: Math.min(...values) - 2,
                    max: Math.max(...values) + 2
                }
            }
        }
    });
}

function exportExcel() {
    const rs = loadRecords();
    if (rs.length === 0) return alert('无数据可导出');
    const ws = XLSX.utils.json_to_sheet(rs.map(x => ({
        日期: x.date,
        体重: x.weight + '公斤',
        备注: x.note || ''
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "体重记录");
    XLSX.writeFile(wb, "体重记录.xlsx");
}

function showWeekReport() {
    const rs = loadRecords();
    if (rs.length < 2) return alert('记录太少，无法生成周报');
    const week = 7;
    const recent = rs.slice(-week);
    const first = recent[0].weight;
    const last = recent.at(-1).weight;
    const change = last - first;
    const txt = change > 0 ? `上升${change.toFixed(1)}公斤` : `下降${Math.abs(change).toFixed(1)}公斤`;
    alert(`【本周减重报告】\n近${recent.length}天：${txt}\n起始：${first.toFixed(1)}公斤 → 当前：${last.toFixed(1)}公斤`);
}

// 统一渲染入口：确保图表优先渲染
function renderAll() {
    renderStats();
    renderList();
    renderChart(); // 重点：图表渲染放在最后，确保数据准备完成
    renderTarget();
}

// 事件绑定
document.getElementById('weightForm').addEventListener('submit', e => {
    e.preventDefault();
    addRecord();
});

document.getElementById('toggleDark').onclick = () => {
    const now = !isDark();
    setDark(now);
    document.getElementById('toggleDark').textContent = now ? '☀ 浅色' : '🌙 深色';
    renderChart(); // 切换深色模式后重新渲染图表
};

// 页面加载完成后初始化（确保Chart.js已加载）
window.onload = () => {
    document.getElementById('date').value = getToday();
    document.getElementById('height').value = loadHeight() || '';
    document.getElementById('targetWeight').value = loadTarget() || '';
    setDark(isDark());
    document.getElementById('toggleDark').textContent = isDark() ? '☀ 浅色' : '🌙 深色';
    updateTime();
    // 延迟100ms渲染图表，确保CDN加载完成
    setTimeout(renderAll, 100);
};
</script>
</body>
</html>
